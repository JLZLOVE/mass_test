server:
  port: 100
  servlet:
    context-path: /Mass_Test
  tomcat:
    uri-encoding: UTF-8

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/mass_test1?useUnicode=true&characterEncoding=utf-8&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=GMT%2B8
    username: root
    password: 123456
  servlet:
    multipart:
      max-file-size: 300MB
      max-request-size: 300MB
  web:
    resources:
      static-locations: classpath:static/,file:static/
  security:
    user:
      name: admin
      password: 123456
  redis:
    host: 127.0.0.1
    port: 6379
    password:
    database: 0
