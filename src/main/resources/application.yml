    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms
security:
  ignore:
    urls:
      - /v2/api-docs/**
      - /v3/api-docs/**
      - /swagger-resources/**
      - /swagger-ui/**
      - /swagger-ui.html
      - /doc.html
      - /webjars/**
      - /favicon.ico
      - /js/**
      - /css/**
      - /img/**
      - /allocation/**
      - /login/**
      # 其他公共接口
jwt:
  secret: d1UP1yD2HgqiVA1NlAQt4N559jtfjCczZqA0M4lSvSQFUieDVIQzqYMdt6mF7IofGgRjJsRLUKTscM9FQ+3S2Q==
  expiration: 360000

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: unity.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    unity.mapper: debug
    org.springframework.security: DEBUG
knife4j:
  basic:
    enable: false
  setting:
    enable-swagger-models: true
    enable-document-manage: true
    enable-dynamic-parameter: false
  production: false

  enable: true
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true